<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lead Processor | Real Estate Dashboard</title>
    <style>
        :root {
            --primary: #00a1e0;
            --primary-dark: #0070d2;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --spam: #6b7280;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.5; }

        header {
            background: #001b34;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        .logo span { color: var(--primary); }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 0.375rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }

        main {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Responsive Layout */
        @media (max-width: 1024px) {
            main { grid-template-columns: 1fr; }
            #detail-panel { position: static; margin-top: 2rem; }
        }

        /* Lead Grid */
        #lead-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .lead-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .lead-card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .lead-card.active { border: 2px solid var(--primary); }

        .lead-card h3 { font-size: 1.125rem; margin-bottom: 0.5rem; }
        .lead-card .company { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1rem; font-weight: 500; }
        .lead-card .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--bg);
            color: var(--text-muted);
        }

        /* Detail Panel */
        #detail-panel {
            background: var(--card-bg);
            border-radius: 0.75rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 5rem;
            min-height: 400px;
        }

        .panel-placeholder { text-align: center; color: var(--text-muted); padding: 4rem 0; }
        .ai-section { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        .ai-section h4 { margin-bottom: 1rem; color: var(--primary-dark); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; }

        .priority-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            color: white;
            font-weight: bold;
            font-size: 0.875rem;
        }
        .priority-High { background: var(--success); }
        .priority-Medium { background: var(--warning); }
        .priority-Low { background: var(--primary); }
        .priority-Spam { background: var(--spam); }
        .priority-Hot { background: var(--danger); }

        .ai-summary { font-size: 0.95rem; margin-bottom: 1rem; color: var(--text-main); }
        .red-flags { color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; }
        .red-flags li { margin-left: 1.2rem; }

        .listing-match {
            background: #f9fafb;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
            border: 1px solid var(--border);
        }
        .listing-match .rank { font-weight: bold; color: var(--primary); }

        .agent-box {
            background: #eff6ff;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid var(--primary);
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modal */
        #sync-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 0.75rem;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .sync-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-family: monospace;
            font-size: 0.8rem;
        }
        .sync-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">SF<span>-AI</span> Sales Engine</div>
    <button class="btn btn-outline" onclick="toggleSyncModal()">View Sync History</button>
</header>

<main>
    <section>
        <h2 style="margin-bottom: 1.5rem;">Incoming Leads</h2>
        <div id="lead-grid"></div>
    </section>

    <aside id="detail-panel">
        <div id="panel-content" class="panel-placeholder">
            <h3>No Lead Selected</h3>
            <p>Select a lead from the grid to analyze and process.</p>
        </div>
    </aside>
</main>

<div id="sync-modal" onclick="if(event.target === this) toggleSyncModal()">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
            <h2>Mock Salesforce Sync History</h2>
            <button class="btn" onclick="toggleSyncModal()">Close</button>
        </div>
        <div id="sync-list"></div>
    </div>
</div>

<script>
    // --- Security: XSS Sanitization Helper ---
    function esc(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    let currentLeads = [];
    let selectedLeadId = null;

    async function fetchLeads() {
        try {
            const res = await fetch('/api/leads');
            currentLeads = await res.json();
            renderLeads();
        } catch (err) {
            document.getElementById('lead-grid').textContent = 'Error loading leads.';
        }
    }

    async function processLead(id) {
        const panel = document.getElementById('panel-content');
        const lead = currentLeads.find(l => l.Id === id);
        
        panel.innerHTML = `
            <div style="text-align: center;">
                <h3>AI Intelligence Engine</h3>
                <p>Analyzing context for ${esc(lead.FirstName || lead.LastName)}...</p>
                <div class="spinner"></div>
            </div>
        `;

        try {
            const res = await fetch(`/api/process-lead/${id}`, { method: 'POST' });
            if (!res.ok) throw new Error('AI Processing Failed');
            const data = await res.json();
            renderAIResults(data, lead);
        } catch (err) {
            panel.innerHTML = `<div style="color:var(--danger)">Error: ${esc(err.message)}</div>`;
        }
    }

    function renderLeads() {
        const grid = document.getElementById('lead-grid');
        grid.innerHTML = '';
        currentLeads.forEach(lead => {
            const card = document.createElement('div');
            card.className = `lead-card ${selectedLeadId === lead.Id ? 'active' : ''}`;
            card.onclick = () => selectLead(lead.Id);
            card.innerHTML = `
                <h3>${esc(lead.FirstName || '')} ${esc(lead.LastName)}</h3>
                <div class="company">${esc(lead.Company)}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="badge">${esc(lead.Industry || 'Real Estate')}</span>
                    <span style="font-size: 0.8rem;">${esc(lead.Status)}</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function selectLead(id) {
        selectedLeadId = id;
        renderLeads();
        const lead = currentLeads.find(l => l.Id === id);
        const panel = document.getElementById('panel-content');
        panel.innerHTML = `
            <h2>${esc(lead.FirstName || '')} ${esc(lead.LastName)}</h2>
            <p class="company">${esc(lead.Company)}</p>
            <div style="font-size: 0.9rem; margin-top: 1rem;">
                <strong>Requirement:</strong><br/>
                <span style="color: var(--text-muted)">${esc(lead.Description)}</span>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:2rem;" onclick="processLead('${id}')">
                ✨ Process with AI
            </button>
        `;
    }

    function renderAIResults(ai, lead) {
        const panel = document.getElementById('panel-content');
        const intel = ai.lead_intelligence;
        
        panel.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:1rem;">
                <h2>AI Insight</h2>
                <span class="priority-badge priority-${esc(intel.priority)}">${esc(intel.priority)}</span>
            </div>
            <div class="ai-summary">${esc(intel.summary)}</div>

            ${intel.red_flags.length ? `
                <div class="ai-section">
                    <h4>Red Flags</h4>
                    <ul class="red-flags">${intel.red_flags.map(f => `<li>${esc(f)}</li>`).join('')}</ul>
                </div>
            ` : ''}

            <div class="ai-section">
                <h4>Matches</h4>
                ${ai.matched_listings.map(m => `
                    <div class="listing-match">
                        <span class="rank">#${m.rank} ${esc(m.listing_id)}</span><br/>
                        ${esc(m.reasoning)}
                    </div>
                `).join('')}
            </div>

            <div class="ai-section">
                <h4>Routing</h4>
                <div class="agent-box">
                    <strong>${esc(ai.agent_routing.agent_name)}</strong><br/>
                    <small>${esc(ai.agent_routing.reasoning)}</small>
                    <div style="margin-top:0.5rem">
                        <strong>Steps:</strong>
                        <ul style="margin-left:1.2rem">${intel.next_steps.map(s => `<li>${esc(s)}</li>`).join('')}</ul>
                    </div>
                </div>
            </div>
        `;
    }

    async function fetchSyncHistory() {
        const list = document.getElementById('sync-list');
        list.innerHTML = '<div class="spinner"></div>';
        try {
            const res = await fetch('/api/sync-history');
            const data = await res.json();
            list.innerHTML = data.reverse().map(item => `
                <div class="sync-item">
                    <strong>[${esc(item.timestamp)}] ${esc(item.type)}</strong>
                    <pre style="background:#f0f0f0; padding:0.5rem;">${esc(JSON.stringify(item.body, null, 2))}</pre>
                </div>
            `).join('') || 'No history.';
        } catch (err) { list.textContent = 'Error loading history.'; }
    }

    function toggleSyncModal() {
        const modal = document.getElementById('sync-modal');
        const isHidden = getComputedStyle(modal).display === 'none';
        modal.style.display = isHidden ? 'flex' : 'none';
        if (isHidden) fetchSyncHistory();
    }

    fetchLeads();
</script>
</body>
</html>
